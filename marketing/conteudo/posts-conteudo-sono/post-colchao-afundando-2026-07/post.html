<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
    background: #000;
  }

  /* ── FEED 1080×1350 ── */
  .feed {
    width: 1080px;
    height: 1350px;
    position: relative;
    overflow: hidden;
  }

  .feed .bg {
    position: absolute;
    inset: 0;
    background: url('../post-colchao-afundando-2026-07/bg-colchao-afundando.png') center top / cover no-repeat;
  }

  .feed .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.18) 0%,
      rgba(0,0,0,0.10) 30%,
      rgba(0,0,0,0.55) 65%,
      rgba(0,18,45,0.92) 100%
    );
  }

  .feed .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 72px 80px;
  }

  .feed .tag {
    display: inline-block;
    background: #00AFEF;
    color: #fff;
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 24px;
    border-radius: 6px;
    margin-bottom: 32px;
    width: fit-content;
  }

  .feed h1 {
    font-size: 88px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    margin-bottom: 24px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .feed h1 span {
    color: #00AFEF;
  }

  .feed .sub {
    font-size: 38px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
    margin-bottom: 52px;
    font-weight: 400;
    font-family: Arial, sans-serif;
  }

  .feed .logo-text .mark {
    background: #0064A6;
    color: #fff;
    font-size: 28px;
    font-weight: 900;
    padding: 10px 22px;
    border-radius: 8px;
    letter-spacing: 0.5px;
    text-transform: lowercase;
    display: inline-block;
  }

  .feed .logo-text .mark em {
    color: #00AFEF;
    font-style: normal;
  }

  /* ── STORY 1080×1920 ── */
  .story {
    width: 1080px;
    height: 1920px;
    position: relative;
    overflow: hidden;
  }

  .story .bg {
    position: absolute;
    inset: 0;
    background: url('../post-colchao-afundando-2026-07/bg-colchao-afundando.png') center center / cover no-repeat;
  }

  .story .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,18,45,0.75) 0%,
      rgba(0,0,0,0.10) 35%,
      rgba(0,0,0,0.15) 60%,
      rgba(0,18,45,0.95) 100%
    );
  }

  .story .content {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 100px 80px 120px;
  }

  .story .top-logo .mark {
    background: #0064A6;
    color: #fff;
    font-size: 30px;
    font-weight: 900;
    padding: 12px 24px;
    border-radius: 8px;
    letter-spacing: 0.5px;
    text-transform: lowercase;
    display: inline-block;
  }

  .story .top-logo .mark em {
    color: #00AFEF;
    font-style: normal;
  }

  .story .bottom {
    display: flex;
    flex-direction: column;
  }

  .story .tag {
    display: inline-block;
    background: #00AFEF;
    color: #fff;
    font-size: 30px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 10px 26px;
    border-radius: 6px;
    margin-bottom: 36px;
    width: fit-content;
  }

  .story h1 {
    font-size: 96px;
    font-weight: 900;
    color: #fff;
    line-height: 1.05;
    margin-bottom: 28px;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
  }

  .story h1 span {
    color: #00AFEF;
  }

  .story .sub {
    font-size: 40px;
    color: rgba(255,255,255,0.85);
    line-height: 1.4;
    font-family: Arial, sans-serif;
  }
</style>
</head>
<body>

<!-- FEED -->
<div class="feed">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="tag">Você sabia?</div>
    <h1>Seu colchão<br>tem um <span>buraco</span><br>no meio?</h1>
    <p class="sub">Se o colchão afundou,<br>sua coluna já sentiu.</p>
    <div class="logo-text">
      <div class="mark">colcH&otilde;es<em>&amp;</em>cia <em>zzz</em></div>
    </div>
  </div>
</div>

<!-- STORY -->
<div class="story">
  <div class="bg"></div>
  <div class="overlay"></div>
  <div class="content">
    <div class="top-logo">
      <div class="mark">colcH&otilde;es<em>&amp;</em>cia</div>
    </div>
    <div class="bottom">
      <div class="tag">Você sabia?</div>
      <h1>Seu colchão<br>tem um <span>buraco</span><br>no meio?</h1>
      <p class="sub">Se o colchão afundou,<br>sua coluna já sentiu.</p>
    </div>
  </div>
</div>

</body>
</html>
