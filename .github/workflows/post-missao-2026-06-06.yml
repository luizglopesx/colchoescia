name: Instagram — Todo mundo merece dormir bem (06/06/2026 12h)

on:
  schedule:
    - cron: '0 15 6 6 *'   # 15h UTC = 12h BRT
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publicar feed e story no Instagram
        env:
          SOCIAL_INSTAGRAM_2_LABEL: colchoes_e_cia
          SOCIAL_INSTAGRAM_2_ACCOUNT_ID: "17841400910282540"
          SOCIAL_INSTAGRAM_2_PAGE_TOKEN: ${{ secrets.INSTAGRAM_COLCHOES_TOKEN }}
        run: python marketing/conteudo/post-missao-2026-06-06/post_instagram.py
