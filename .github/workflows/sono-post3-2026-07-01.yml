name: Instagram — Sono Post 3 (01/07)
on:
  schedule:
    - cron: '0 15 1 7 *'  # 15h UTC = 12h BRT
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Publicar Instagram
        env:
          SOCIAL_INSTAGRAM_1_ACCOUNT_ID: ${{ secrets.SOCIAL_INSTAGRAM_1_ACCOUNT_ID }}
          SOCIAL_INSTAGRAM_1_TOKEN: ${{ secrets.SOCIAL_INSTAGRAM_1_TOKEN }}
        run: |
          python3 .claude/skills/int-instagram/scripts/instagram_publisher.py publish_photo \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/marketing/conteudo/posts-conteudo-sono/post-casais-colchao-2026-06/post.png" \
            "Você ri, mas já passou por isso.

Um quer mole, o outro quer firme. Um esquenta à noite, o outro sente frio. Um mexe muito e acorda o outro. A cama vira campo de batalha — e de manhã os dois acordam mal.

A boa notícia: isso tem solução.

A gente tem colchões que equilibram os dois lados, e pode te ajudar a escolher o tamanho e o modelo certo pro casal. Sem compromisso, sem enrolação.

Vem testar. Às vezes uma tarde na loja resolve anos de noite mal dormida.

