name: Instagram — Sono Post 3 (01/07)
on:
  schedule:
    - cron: '0 15 1 7 *'  # 15h UTC = 12h BRT
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Publicar Instagram
        env:
          SOCIAL_INSTAGRAM_2_LABEL: colchoes_e_cia
          SOCIAL_INSTAGRAM_2_ACCOUNT_ID: "17841400910282540"
          SOCIAL_INSTAGRAM_2_PAGE_TOKEN: ${{ secrets.INSTAGRAM_COLCHOES_TOKEN }}
        run: python3 marketing/conteudo/posts-conteudo-sono/post-casais-colchao-2026-06/post_instagram.py
