name: Instagram — Sono Post 1 (24/06)
on:
  schedule:
    - cron: '0 15 24 6 *'  # 15h UTC = 12h BRT
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Publicar Instagram
        env:
          SOCIAL_INSTAGRAM_1_ACCOUNT_ID: ${{ secrets.SOCIAL_INSTAGRAM_1_ACCOUNT_ID }}
          SOCIAL_INSTAGRAM_1_TOKEN: ${{ secrets.SOCIAL_INSTAGRAM_1_TOKEN }}
        run: |
          python3 .claude/skills/int-instagram/scripts/instagram_publisher.py publish_photo \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/marketing/conteudo/posts-conteudo-sono/post-acorda-cansado-2026-06/post.png" \
            "Você deita cedo, dorme as horas certas — e acorda do mesmo jeito: cansado.

Pode não ser a noite que foi curta. Na maioria das vezes, o problema está onde você dorme.

Colchão velho perde o suporte sem avisar. O corpo acostuma com o desconforto. Você nem percebe que tá dormindo mal — até trocar e sentir a diferença na primeira noite.

Se você acorda com dor nas costas, sensação de noite mal dormida ou levanta cansado todo dia: talvez seja hora de olhar pro colchão.

Vem na loja. A gente te ajuda a escolher sem enrolação.

