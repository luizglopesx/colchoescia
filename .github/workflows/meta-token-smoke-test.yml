name: Meta Token Smoke Test

on:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Instagram Graph token
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_ACCOUNT_ID: ${{ secrets.IG_ACCOUNT_ID }}
        run: |
          set -euo pipefail

          response="$(curl -fsS "https://graph.facebook.com/v25.0/${IG_ACCOUNT_ID}?fields=id,username&access_token=${IG_TOKEN}")"
          RESPONSE="$response" python3 - <<'PY'
          import json
          import os
          import sys

          payload = json.loads(os.environ["RESPONSE"])
          if not payload.get("id"):
              raise SystemExit("Graph API response did not include an id")

          print(f"Token OK for Instagram account {payload.get('username', '<no username>')} ({payload['id']})")
          PY
