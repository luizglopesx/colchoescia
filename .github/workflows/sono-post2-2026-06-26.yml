name: Instagram — Sono Post 2 (26/06)
on:
  schedule:
    - cron: '0 15 26 6 *'  # 15h UTC = 12h BRT
  workflow_dispatch:
jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Publicar Instagram
        env:
          SOCIAL_INSTAGRAM_1_ACCOUNT_ID: ${{ secrets.SOCIAL_INSTAGRAM_1_ACCOUNT_ID }}
          SOCIAL_INSTAGRAM_1_TOKEN: ${{ secrets.SOCIAL_INSTAGRAM_1_TOKEN }}
        run: |
          python3 .claude/skills/int-instagram/scripts/instagram_publisher.py publish_photo \
            "https://raw.githubusercontent.com/${{ github.repository }}/main/marketing/conteudo/posts-conteudo-sono/post-dor-costas-2026-06/post.png" \
            "Acorda todo dia com dor nas costas e acha que é normal?

Não é.

Dor nas costas de manhã é sinal de que o colchão perdeu o suporte. Ele não sustenta mais a coluna do jeito certo durante a noite — e o corpo paga o preço toda manhã.

O problema é que a gente acostuma. A dor vira rotina. E você vai levando, sem associar ao colchão.

Se isso tá acontecendo com você, passa na loja. A gente te mostra a diferença de deitar num colchão que ainda funciona de verdade.

