name: Instagram — Quem Somos (04/06/2026 12h)

on:
  schedule:
    - cron: '0 15 4 6 *'   # 15h UTC = 12h BRT
  workflow_dispatch:         # permite disparar manualmente para testar

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Publicar feed e story no Instagram
        env:
          SOCIAL_INSTAGRAM_2_LABEL: colchoes_e_cia
          SOCIAL_INSTAGRAM_2_ACCOUNT_ID: "17841400910282540"
          SOCIAL_INSTAGRAM_2_PAGE_TOKEN: ${{ secrets.INSTAGRAM_COLCHOES_TOKEN }}
        run: python marketing/conteudo/post-quem-somos-2026-06-04/post_instagram.py
